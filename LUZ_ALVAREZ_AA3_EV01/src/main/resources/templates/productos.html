<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIB - Gestion de Inventarios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #F5F6FA; }
        .header {
            background: #1A1D2E; padding: 16px 28px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { color: white; font-size: 18px; }
        .header span { color: rgba(255,255,255,0.6); font-size: 13px; }
        .contenido { padding: 28px; }
        .titulo { font-size: 22px; font-weight: bold; color: #1A1D2E; margin-bottom: 20px; }
        .form-card {
            background: white; border-radius: 12px;
            padding: 24px; margin-bottom: 24px; border: 1px solid #E8E8F0;
        }
        .form-card h3 { color: #E91E8C; margin-bottom: 16px; }
        .form-fila { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .campo label {
            display: block; font-size: 12px; font-weight: bold;
            color: #666; text-transform: uppercase; margin-bottom: 5px;
        }
        .campo input, .campo select {
            width: 100%; padding: 10px 12px;
            border: 2px solid #eee; border-radius: 8px; font-size: 14px; outline: none;
        }
        .campo input:focus, .campo select:focus { border-color: #E91E8C; }
        .btn-guardar {
            margin-top: 16px; background: #E91E8C; color: white;
            border: none; padding: 11px 24px; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .tabla-card { background: white; border-radius: 12px; border: 1px solid #E8E8F0; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: #FFF0F9; }
        th { padding: 13px 16px; text-align: left; font-size: 12px; font-weight: bold; text-transform: uppercase; color: #C2185B; }
        tbody tr { border-top: 1px solid #F0F0F8; }
        tbody tr:hover { background: #F5F6FA; }
        td { padding: 12px 16px; font-size: 14px; }
        .chip-ok { background: #D1FAE5; color: #065F46; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .chip-bajo { background: #FEF3C7; color: #92400E; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .btn-eliminar {
            background: #FEE2E2; color: #991B1B; border: none;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>GIB - Sistema de Gestion de Inventarios | Cosmeticos Kitty</h1>
        <span>Spring Boot Framework</span>
    </div>
    <div class="contenido">
        <div class="titulo">Inventario de Productos</div>

        <!-- Formulario registro producto -->
        <div class="form-card">
            <h3>Registrar Nuevo Producto</h3>
            <form th:action="@{/productos/guardar}" th:object="${nuevoProducto}" method="post">
                <div class="form-fila">
                    <div class="campo">
                        <label>Nombre *</label>
                        <input type="text" th:field="*{nombre}" placeholder="Nombre del producto" required>
                    </div>
                    <div class="campo">
                        <label>Precio Venta ($)</label>
                        <input type="number" th:field="*{precioVenta}" placeholder="0">
                    </div>
                    <div class="campo">
                        <label>Stock Actual</label>
                        <input type="number" th:field="*{stockActual}" placeholder="0">
                    </div>
                </div>
                <div class="form-fila">
                    <div class="campo">
                        <label>Stock Minimo</label>
                        <input type="number" th:field="*{stockMinimo}" placeholder="10">
                    </div>
                    <div class="campo">
                        <label>Estado</label>
                        <select th:field="*{estado}">
                            <option value="activo">Activo</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-guardar">Guardar Producto</button>
            </form>
        </div>

        <!-- Tabla de productos -->
        <div class="tabla-card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio Venta</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Accion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="producto : ${productos}">
                        <td th:text="${producto.idProducto}"></td>
                        <td><strong th:text="${producto.nombre}"></strong></td>
                        <td th:text="'$' + ${producto.precioVenta}"></td>
                        <td th:text="${producto.stockActual} + ' uds.'"></td>
                        <td>
                            <span th:class="${producto.stockActual < producto.stockMinimo} ? 'chip-bajo' : 'chip-ok'"
                                  th:text="${producto.stockActual < producto.stockMinimo} ? 'Bajo' : 'OK'"></span>
                        </td>
                        <td>
                            <a th:href="@{/productos/eliminar/{id}(id=${producto.idProducto})}"
                               onclick="return confirm('Eliminar producto?')">
                                <button class="btn-eliminar">Eliminar</button>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
